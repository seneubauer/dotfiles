[general]
import = [
    "~/.config/alacritty/themes/eldritch.toml"
]

[window]
dynamic_title = true
padding.x = 10
padding.y = 10
opacity = 0.85

[window.dimensions]
columns = 120
lines = 30

[font]
size = 11

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[font.offset]
x = 0
y = 0
