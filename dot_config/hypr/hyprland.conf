
# vars
$mainMod = SUPER

# environment variables
env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = __GL_VRR_ALLOWED,1
env = __GL_GSYNC_ALLOWED,1
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = HYPRCURSOR_THEME,Oxygen_Zion
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Oxygen_Zion
env = XCURSOR_SIZE,24

# monitors
monitor = DP-1,3440x1440@143.97,1920x0,1
monitor = HDMI-A-1,1920x1080@60,0x0,1

# application keybinds
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, fuzzel

# noctalia keybinds
bind = $mainMod CONTROL SHIFT, Q, exec, killall noctalia
bind = $mainMod CONTROL SHIFT, S, exec, noctalia
bind = $mainMod, D, exec, noctalia msg panel-toggle launcher
bind = $mainMod, Z, exec, noctalia msg panel-toggle control-center
bind = $mainMod, S, exec, noctalia msg settings-toggle
bind = $mainMod, C, exec, noctalia msg panel-toggle clipboard
bind = $mainMod, W, exec, noctalia msg panel-toggle wallpaper
bind = $mainMod, N, exec, noctalia msg panel-toggle session

# workspace keybinds
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# focus keybinds
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# move keybinds
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# resize keybinds
bind = $mainMod CONTROL, left, resizeactive, -20 0
bind = $mainMod CONTROL, right, resizeactive, 20 0
bind = $mainMod CONTROL, up, resizeactive, 0 -20
bind = $mainMod CONTROL, down, resizeactive, 0 20

# input
input {

    # mouse settings
    sensitivity = 0
    force_no_accel = 1
    accel_profile = flat
}

cursor {
    no_hardware_cursors = 1
}

# behavior
animations {
    enabled = false
}

# appearance
general {
    gaps_in = 9
    gaps_out = 12
}

decoration {
    rounding = 10
    rounding_power = 2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

# optimizations
misc {
    vrr = 0
}

render {
    direct_scanout = true
}

# run noctalia shell
exec-once = noctalia
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# For Noctalia Color templates
source = ~/.config/hypr/noctalia.conf
